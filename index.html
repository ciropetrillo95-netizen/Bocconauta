<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Bocconauta">
<meta name="theme-color" content="#F8F8FA">
<title>Bocconauta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

:root{
  /* ─── SURFACES ─── */
  --bg:#F8F8FA;
  --bg-grad:radial-gradient(140% 90% at 50% -5%, #EEF0FF 0%, #F4F4F8 45%, #F8F8FA 100%);
  --card:#FFFFFF;
  --card2:#F2F3F9;
  --line:#E8E9F2;
  --line2:#D4D6E8;
  /* ─── INK ─── */
  --ink:#0D0F1A;
  --muted:#6B6F8A;
  --faint:#A8ABBE;
  /* ─── BRAND (deep space blue) ─── */
  --blue:#1B2FE8;
  --blue-h:#2E40F0;
  --blue-d:#1020C0;
  --blue-t:#EEF0FF;
  --indigo:#6C47FF;
  --star-off:#D7DAEC;
  /* ─── TOMATO (solo azioni distruttive) ─── */
  --tomato:#F0532B;
  --tomato-t:#FEE9E2;
  /* ─── FX ─── */
  --shadow-sm:0 2px 10px -3px rgba(13,15,60,.10);
  --shadow:0 10px 28px -10px rgba(13,15,60,.16);
  --shadow-lg:0 22px 50px -16px rgba(13,15,60,.22);
  --glow-blue:0 8px 28px -6px rgba(27,47,232,.35);
  --fd:'Bricolage Grotesque',sans-serif;
  --fb:'Plus Jakarta Sans',sans-serif;
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);color:var(--ink);font-family:var(--fb);-webkit-font-smoothing:antialiased;overflow:hidden}

/* ─── ICON BASE ─── */
.ic{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;vertical-align:middle}
.ic svg{display:block}
/* ─── STAR RATING ─── */
.rating{display:inline-flex;gap:3px;align-items:center}
.star-btn{cursor:pointer;display:inline-flex;transition:transform .12s}
.star-btn:active{transform:scale(1.18)}

/* ─── APP SHELL ─── */
#app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;background:var(--bg-grad);position:relative;overflow:hidden}
.doodle-layer{position:absolute;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.doodle-layer svg{position:absolute;opacity:.045}
#app > *:not(.doodle-layer){position:relative;z-index:1}

/* ─── HEADER ─── */
.hdr{
  padding:calc(var(--st) + 18px) 18px 10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
}
.brand{display:flex;align-items:center;gap:11px}
.brand-mark{
  width:38px;height:38px;border-radius:13px;
  background:linear-gradient(135deg,var(--blue-h),var(--indigo));
  box-shadow:var(--glow-blue);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transform:rotate(-4deg);
}
.logo{font-family:var(--fd);font-size:24px;font-weight:800;letter-spacing:-.8px;line-height:1;color:var(--ink)}
.logo em{color:var(--blue);font-style:normal}
.hdr-meta{
  font-size:12px;color:#1020C0;font-weight:700;
  background:#EEF0FF;padding:6px 12px;border-radius:999px;
}

/* ─── TABS (segmented) ─── */
.tabs{display:flex;margin:12px 16px 0;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:5px;gap:5px;flex-shrink:0;box-shadow:var(--shadow-sm)}
.tab{
  flex:1;padding:11px 0;font-size:13px;font-weight:700;color:var(--muted);
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;border:none;background:none;
  font-family:var(--fb);transition:all .18s;border-radius:12px;
}
.tab .ic{opacity:.9}
.tab.on{background:linear-gradient(135deg,var(--blue-h),var(--indigo));color:#fff !important;box-shadow:var(--glow-blue)}
.tab-badge{
  display:inline-flex;align-items:center;justify-content:center;background:var(--tomato);color:#fff;
  font-size:9.5px;font-weight:800;border-radius:9px;min-width:17px;padding:1px 5px;
}

/* ─── VIEWS ─── */
.view{display:none;flex:1;overflow:hidden;flex-direction:column}
.view.on{display:flex}

/* ─── STASERA ─── */
.stasera-wrap{padding:16px 16px 0;flex-shrink:0}
.stasera-btn{
  width:100%;background:linear-gradient(135deg,var(--blue-h),var(--indigo));border:none;border-radius:20px;
  padding:17px 18px;cursor:pointer;
  display:flex;align-items:center;justify-content:space-between;
  color:#fff !important;font-family:var(--fd);font-size:16px;font-weight:800;letter-spacing:-.3px;
  transition:transform .12s,box-shadow .2s;box-shadow:var(--glow-blue);
}
.stasera-btn:active{transform:scale(.985)}
.stasera-left{display:flex;align-items:center;gap:11px}
.stasera-right{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:700}
.stasera-pill{background:rgba(255,255,255,.22);padding:4px 11px;border-radius:999px}

/* ─── SEARCH ─── */
.search-wrap{padding:12px 16px 0;flex-shrink:0;position:relative}
.search-box{
  width:100%;background:var(--card);border:1.5px solid var(--line);
  border-radius:15px;padding:13px 14px 13px 44px;
  color:var(--ink);font-family:var(--fb);font-size:14px;font-weight:500;outline:none;
  transition:border-color .2s,box-shadow .2s;box-shadow:var(--shadow-sm);
}
.search-box:focus{border-color:var(--blue);box-shadow:0 0 0 4px var(--blue-t)}
.search-box::placeholder{color:var(--faint);font-weight:500}
.s-ico{position:absolute;left:30px;top:50%;transform:translateY(-50%);color:var(--faint);pointer-events:none;display:flex}
.ac{
  position:absolute;left:16px;right:16px;top:calc(100% + 6px);
  background:var(--card);border:1px solid var(--line);
  border-radius:16px;z-index:60;overflow:hidden;display:none;box-shadow:var(--shadow-lg);
}
.ac-row{padding:11px 14px;cursor:pointer;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
.ac-row:last-child{border-bottom:none}
.ac-row:active{background:var(--card2)}
.ac-ico{width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
.ac-name{font-size:13.5px;font-weight:700}
.ac-addr{font-size:11.5px;color:var(--muted);margin-top:1px;font-weight:500}

/* ─── FILTERS ─── */
.filters{display:flex;gap:8px;padding:14px 16px 2px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.filters::-webkit-scrollbar{display:none}
.chip{
  flex-shrink:0;background:var(--card);border:1.5px solid var(--line);
  border-radius:999px;padding:8px 15px;font-size:12.5px;color:var(--muted);
  cursor:pointer;transition:all .15s;white-space:nowrap;font-family:var(--fb);font-weight:600;
  display:flex;align-items:center;gap:6px;
}
.chip.on{background:var(--ink);border-color:var(--ink);color:#fff}

/* ─── SCROLL ─── */
.scroll{flex:1;overflow-y:auto;padding:20px 16px calc(var(--sb)+18px);-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{display:none}

/* ─── PLACE CARD ─── */
.pcard{
  background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:11px 12px;margin-bottom:7px;cursor:pointer;
  display:flex;align-items:center;gap:10px;
  transition:transform .12s,box-shadow .2s;box-shadow:var(--shadow-sm);
}
.pcard:active{transform:scale(.99)}
.pcard.unrated{border-color:var(--tomato-t)}
.pc-type{
  width:42px;height:42px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:22px;
}
.pc-left{flex:1;min-width:0}
.pc-name{font-family:var(--fd);font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.2px}
.pc-sub{font-size:11px;color:var(--muted);margin-top:1px;font-weight:500}
.pc-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.pc-pizze{display:flex;gap:2px}
.badge-new{font-size:10px;background:var(--tomato);color:#fff;border-radius:999px;padding:3px 9px;font-family:var(--fb);font-weight:700;letter-spacing:.2px}

/* ─── EMPTY ─── */
.empty{text-align:center;padding:60px 28px;color:var(--muted)}
.empty-icon{color:var(--line2);margin-bottom:16px;display:flex;justify-content:center}
.empty-title{font-family:var(--fd);font-size:17px;color:var(--ink);font-weight:700;margin-bottom:7px}
.empty p{font-size:13px;line-height:1.6;font-weight:500}

/* ─── BADGE VIEW ─── */
.badge-scroll{flex:1;overflow-y:auto;padding:16px 16px calc(var(--sb)+18px);-webkit-overflow-scrolling:touch}
.badge-scroll::-webkit-scrollbar{display:none}
.badge-stats{
  background:var(--card);border:1px solid var(--line);border-radius:20px;
  padding:18px 16px;margin-bottom:24px;box-shadow:var(--shadow-sm);
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;
}
.bstat{text-align:center;padding:0 8px;position:relative}
.bstat+.bstat::before{content:'';position:absolute;left:0;top:8%;height:84%;width:1px;background:var(--line)}
.bstat-num{font-family:var(--fd);font-size:27px;font-weight:800;color:var(--blue);letter-spacing:-1px;line-height:1}
.bstat-lbl{font-size:11px;color:var(--muted);margin-top:5px;font-weight:600}
.badge-cat-title{
  font-family:var(--fd);font-size:13px;font-weight:800;color:var(--ink);
  letter-spacing:-.2px;margin-bottom:14px;margin-top:26px;display:flex;align-items:center;gap:8px;
}
.badge-cat-title::before{content:'';width:9px;height:9px;border-radius:3px;background:var(--cat,var(--blue))}
.badge-cat-title:first-of-type{margin-top:0}
.badge-ring-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:18px 8px;margin-bottom:4px;
}
.badge-ring-item{
  display:flex;flex-direction:column;align-items:center;gap:8px;
  cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .12s;
}
.badge-ring-item:active{transform:scale(.95)}
.badge-ring-item.locked{opacity:.55}
.ring-wrap{position:relative;width:66px;height:66px;flex-shrink:0;background:var(--card);border-radius:50%;box-shadow:var(--shadow-sm)}
.ring-wrap svg.ring{position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg)}
.ring-icon{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--cat,var(--blue));font-size:26px}
.badge-ring-item.locked .ring-icon{color:var(--faint)}
.ring-name{font-size:10.5px;color:var(--ink);font-weight:600;text-align:center;line-height:1.3;max-width:70px}
.ring-new{position:absolute;top:1px;right:3px;width:12px;height:12px;background:var(--tomato);border-radius:50%;border:2.5px solid var(--card)}

/* ─── DETAIL SHEET ─── */
.sheet-overlay{
  position:fixed;inset:0;background:rgba(10,12,40,.45);z-index:100;
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .25s;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
}
.sheet-overlay.open{opacity:1;pointer-events:all}
.sheet{
  background:var(--bg);border-radius:26px 26px 0 0;
  width:100%;max-width:480px;height:93dvh;
  display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .34s cubic-bezier(.32,.72,0,1);
}
.sheet-overlay.open .sheet{transform:translateY(0)}
.sheet-handle{width:42px;height:5px;background:var(--line2);border-radius:3px;margin:11px auto 0;flex-shrink:0}
.sheet-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 0 calc(var(--sb)+24px)}
.sheet-scroll::-webkit-scrollbar{display:none}
.sh-hdr{padding:18px 18px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.sh-hdr-left{display:flex;align-items:center;gap:13px;min-width:0}
.sh-type-ico{width:46px;height:46px;border-radius:14px;background:linear-gradient(135deg,#2E40F0,#6C47FF);box-shadow:0 8px 22px -6px rgba(27,47,232,.4);display:flex;align-items:center;justify-content:center;flex-shrink:0;transform:rotate(-4deg)}
.sh-name{font-family:var(--fd);font-size:22px;font-weight:800;line-height:1.08;letter-spacing:-.5px}
.sh-type{font-size:12.5px;color:var(--muted);margin-top:4px;font-weight:600}
.sh-close{background:var(--card);border:1px solid var(--line);border-radius:50%;width:36px;height:36px;color:var(--muted);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-sm)}
.global-rating{margin:18px 16px 0;background:var(--blue-t);border-radius:20px;padding:17px 18px;display:flex;align-items:center;justify-content:space-between}
.gr-label{font-size:11px;color:var(--blue-d);margin-bottom:9px;font-weight:700;letter-spacing:.3px;text-transform:uppercase}
.gr-pizze{display:flex;gap:6px}
.gr-right{text-align:right}
.gr-txt{font-family:var(--fd);font-size:30px;font-weight:800;color:var(--blue-d);line-height:1;letter-spacing:-1px}
.gr-txt small{font-size:15px;color:var(--blue);font-weight:700}
.gr-sub{font-size:11.5px;color:var(--blue-d);margin-top:4px;font-weight:600;opacity:.8}
.ig-strip{margin:12px 16px 0;display:flex;gap:10px}
.ig-btn{flex:1;background:var(--blue-t);color:var(--blue);border:none;border-radius:14px;padding:13px 14px;font-size:13.5px;font-weight:700;cursor:pointer;font-family:var(--fb);display:flex;align-items:center;justify-content:center;gap:8px}
.del-btn{background:var(--tomato-t);color:var(--tomato);border:none;border-radius:14px;padding:13px 14px;cursor:pointer;font-family:var(--fb);display:flex;align-items:center;justify-content:center;gap:8px;font-size:13.5px;font-weight:700}
.sec-title{font-family:var(--fd);font-size:14px;font-weight:800;color:var(--ink);letter-spacing:-.2px;padding:24px 18px 11px}
.food-card{background:var(--card);border-radius:18px;margin:0 16px;overflow:hidden;border:1px solid var(--line);box-shadow:var(--shadow-sm)}
.food-row{padding:13px 15px;border-bottom:1px solid var(--line)}
.food-row:last-child{border-bottom:none}
.fr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;gap:10px}
.fr-label{font-size:13.5px;font-weight:700;display:flex;align-items:center;gap:10px;min-width:0}
.fr-icon{width:30px;height:30px;border-radius:9px;background:#EEF0FF;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fr-icon svg{width:17px;height:17px;stroke:#1B2FE8;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.fr-pizze{display:flex;gap:4px;flex-shrink:0}
.fr-note{width:100%;background:var(--card2);border:1px solid var(--line);border-radius:11px;padding:9px 11px;color:var(--ink);font-family:var(--fb);font-size:12.5px;font-weight:500;outline:none;resize:none;line-height:1.5;transition:border-color .2s}
.fr-note:focus{border-color:var(--blue)}
.fr-note::placeholder{color:var(--faint)}
.tags-wrap{padding:0 16px;display:flex;flex-wrap:wrap;gap:9px}
.atm-tag{background:var(--card);border:1.5px solid var(--line);border-radius:999px;padding:8px 14px;font-size:12.5px;color:var(--muted);cursor:pointer;transition:all .15s;font-family:var(--fb);font-weight:600}
.atm-tag.on{background:var(--blue);border-color:var(--blue);color:#fff}
.final-note{width:calc(100% - 32px);margin:0 16px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 14px;color:var(--ink);font-family:var(--fb);font-size:13.5px;font-weight:500;outline:none;resize:none;line-height:1.55;transition:border-color .2s;box-shadow:var(--shadow-sm)}
.final-note:focus{border-color:var(--blue)}
.final-note::placeholder{color:var(--faint)}
.save-btn{margin:18px 16px 0;width:calc(100% - 32px);background:linear-gradient(135deg,var(--blue-h),var(--indigo));border:none;border-radius:16px;padding:15px;color:#fff;font-family:var(--fd);font-size:15px;font-weight:800;cursor:pointer;transition:transform .12s;box-shadow:var(--glow-blue)}
.save-btn:active{transform:scale(.99)}

/* ─── MODAL STASERA ─── */
.modal-overlay{position:fixed;inset:0;background:rgba(10,12,40,.45);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg);border-radius:26px 26px 0 0;width:100%;max-width:480px;padding:8px 0 calc(var(--sb)+24px);max-height:76dvh;overflow-y:auto;transform:translateY(100%);transition:transform .34s cubic-bezier(.32,.72,0,1)}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-handle{width:42px;height:5px;background:var(--line2);border-radius:3px;margin:11px auto 16px}
.modal-title{font-family:var(--fd);font-size:20px;font-weight:800;padding:0 18px 4px;letter-spacing:-.5px}
.modal-sub{font-size:12.5px;color:var(--muted);padding:0 18px 16px;font-weight:600}
.tn-card{margin:0 16px 11px;background:var(--card);border:1px solid var(--line);border-radius:17px;padding:14px 15px;display:flex;align-items:center;justify-content:space-between;gap:12px;box-shadow:var(--shadow-sm)}
.tn-name{font-family:var(--fd);font-size:15px;font-weight:700;letter-spacing:-.3px}
.tn-pizze{display:flex;gap:2px;margin-top:5px}
.tn-type{font-size:11.5px;color:var(--muted);margin-top:6px;font-weight:600}
.tn-go{flex-shrink:0;background:linear-gradient(135deg,var(--blue-h),var(--indigo));color:#fff;border:none;border-radius:11px;padding:10px 16px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:var(--fb)}
.no-top{text-align:center;padding:34px 22px;color:var(--muted);font-size:13.5px;line-height:1.7;font-weight:500}
.no-top .ic{color:var(--line2);margin-bottom:12px;display:flex;justify-content:center}

/* ─── BADGE UNLOCK POPUP ─── */
.unlock-overlay{position:fixed;inset:0;background:rgba(10,12,40,.55);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px)}
.unlock-overlay.show{opacity:1;pointer-events:all}
.unlock-box{background:var(--card);border:2px solid var(--cat,var(--blue));border-radius:26px;padding:36px 30px;text-align:center;max-width:300px;transform:scale(.82);transition:transform .32s cubic-bezier(.34,1.56,.64,1);box-shadow:var(--shadow-lg)}
.unlock-overlay.show .unlock-box{transform:scale(1)}
.unlock-icon{width:84px;height:84px;border-radius:50%;background:var(--cat-t,var(--blue-t));color:var(--cat,var(--blue));display:flex;align-items:center;justify-content:center;margin:0 auto 18px}
.unlock-label{font-size:11px;color:var(--cat,var(--blue));font-weight:800;letter-spacing:1.6px;text-transform:uppercase;margin-bottom:8px}
.unlock-name{font-family:var(--fd);font-size:23px;font-weight:800;margin-bottom:9px;letter-spacing:-.5px}
.unlock-desc{font-size:13.5px;color:var(--muted);line-height:1.6;margin-bottom:24px;white-space:pre-line;font-weight:500}
.unlock-close{background:linear-gradient(135deg,var(--blue-h),var(--indigo));border:none;border-radius:14px;padding:13px 34px;color:#fff;font-family:var(--fd);font-size:15px;font-weight:800;cursor:pointer}

/* ─── TOAST ─── */
.toast{position:fixed;bottom:calc(var(--sb)+24px);left:50%;transform:translateX(-50%) translateY(12px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:999px;font-size:13.5px;font-weight:600;opacity:0;transition:all .22s;pointer-events:none;z-index:400;white-space:nowrap;box-shadow:var(--shadow-lg)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ─── COSMIC DETAILS ─── */
.star-field{position:absolute;inset:0;pointer-events:none;overflow:hidden;border-radius:inherit}
.star-dot{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s)}
@keyframes twinkle{0%,100%{opacity:.15;transform:scale(1)}50%{opacity:.7;transform:scale(1.3)}}
.cosmos-tag{
  display:inline-flex;align-items:center;gap:5px;
  font-size:10px;font-weight:700;color:var(--blue);
  background:var(--blue-t);border-radius:999px;padding:3px 9px;

// ─── STATS ───
function computeStats(){
  const notes = places.reduce((acc,p)=>{
    return acc + Object.values(p.food||{}).filter(f=>f.n&&f.n.trim().length>0).length;
  },0);
  return {
    total: places.length,
    rated: places.filter(p=>p.rating>0).length,
    top:   places.filter(p=>p.rating>=4).length,
    pizza: places.filter(p=>p.type==='pizzeria').length,
    rist:  places.filter(p=>p.type==='ristorante').length,
    bar:   places.filter(p=>p.type==='bar').length,
    notes,
  };
}

// ─── BADGE CHECK ───
function checkBadges(){
  const stats = computeStats();
  const newlyUnlocked = [];
  BADGES.forEach(b=>{
    if(!unlockedBadges[b.id] && b.check(stats)){
      unlockedBadges[b.id] = new Date().toISOString().split('T')[0];
      newlyUnlocked.push(b);
    }
  });
  if(newlyUnlocked.length){
    localStorage.setItem('sl4_badges', JSON.stringify(unlockedBadges));
    unlockQueue.push(...newlyUnlocked);
    showNextUnlock();
    updateNewBadgeCount();
  }
}

function tintBox(b){
  const box = document.getElementById('unlockBox');
  box.style.setProperty('--cat', CAT_COLOR[b.cat]||'var(--green)');
  box.style.setProperty('--cat-t', CAT_TINT[b.cat]||'var(--green-t)');
}

let unlockShowing = false;
function showNextUnlock(){
  if(unlockShowing || !unlockQueue.length) return;
  const b = unlockQueue.shift();
  unlockShowing = true;
  tintBox(b);
  document.getElementById('unlockIcon').textContent = BADGE_EMOJI[b.id] || b.icon;
  document.getElementById('unlockName').textContent = b.name;
  document.getElementById('unlockDesc').textContent = b.desc;
  document.getElementById('unlockOverlay').classList.add('show');
}
function closeUnlock(){
  document.getElementById('unlockOverlay').classList.remove('show');
  setTimeout(()=>{ unlockShowing=false; showNextUnlock(); }, 300);
}

function updateNewBadgeCount(){
  const newCount = BADGES.filter(b=>unlockedBadges[b.id]).length;
  const seen = parseInt(sessionStorage.getItem('sl4_seen_badges')||'0');
  const diff = newCount - seen;
  const el = document.getElementById('newBadgeCount');
  if(!el) return;
  if(diff>0){ el.style.display=''; el.textContent=diff; }
  else el.style.display='none';
}

// ─── RENDER BADGES ───
function ringArc(pct, unlocked, color){
  const r = 27, cx = 33, cy = 33;
  const circ = 2 * Math.PI * r;
  const trackColor = 'var(--line)';
  const fillColor = unlocked ? color : 'var(--line2)';
  const dash = (pct / 100) * circ;
  const gap = circ - dash;
  return `<svg class="ring" viewBox="0 0 66 66" xmlns="http://www.w3.org/2000/svg">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${trackColor}" stroke-width="4.5"/>
    ${pct>0?`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${fillColor}" stroke-width="4.5"
      stroke-dasharray="${dash} ${gap}" stroke-linecap="round"/>`:''}
  </svg>`;
}

function renderBadges(){
  const stats = computeStats();
  const unlockedCount = BADGES.filter(b=>unlockedBadges[b.id]).length;
  const cats = [...new Set(BADGES.map(b=>b.cat))];
  const today = new Date().toISOString().split('T')[0];

  let html = `<div class="badge-stats">
    <div class="bstat"><div class="bstat-num">${stats.total}</div><div class="bstat-lbl">Locali</div></div>
    <div class="bstat"><div class="bstat-num">${stats.rated}</div><div class="bstat-lbl">Valutati</div></div>
    <div class="bstat"><div class="bstat-num">${unlockedCount}/${BADGES.length}</div><div class="bstat-lbl">Badge</div></div>
  </div>`;

  cats.forEach(cat=>{
    const col = CAT_COLOR[cat]||'var(--green)';
    const catBadges = BADGES.filter(b=>b.cat===cat);
    html += `<div class="badge-cat-title" style="--cat:${col}">${cat}</div><div class="badge-ring-grid">`;
    catBadges.forEach(b=>{
      const unlocked = !!unlockedBadges[b.id];
      const [cur,max] = b.prog(stats);
      const pct = unlocked ? 100 : Math.min(96, Math.round(cur/max*100));
      const isNew = unlocked && unlockedBadges[b.id] === today;
      html += `<div class="badge-ring-item ${unlocked?'':'locked'}" style="--cat:${col}" onclick="showBadgeDetail('${b.id}')">
        <div class="ring-wrap">
          ${ringArc(pct, unlocked, col)}
          <div class="ring-icon">${BADGE_EMOJI[b.id]||'🏅'}</div>
          ${isNew?'<div class="ring-new"></div>':''}
        </div>
        <div class="ring-name">${b.name}</div>
      </div>`;
    });
    html += `</div>`;
  });

  document.getElementById('badgeView').innerHTML = html;
}

function showBadgeDetail(id){
  const b = BADGES.find(x=>x.id===id); if(!b) return;
  const stats = computeStats();
  const unlocked = !!unlockedBadges[b.id];
  const [cur,max] = b.prog(stats);
  tintBox(b);
  document.getElementById('unlockIcon').textContent = BADGE_EMOJI[b.id] || b.icon;
  document.getElementById('unlockName').textContent = b.name;
  document.getElementById('unlockDesc').textContent = unlocked
    ? b.desc + '\n\nSbloccato il ' + fmtDate(unlockedBadges[b.id])
    : b.desc + '\n\nProgresso: ' + cur + ' / ' + max;
  document.getElementById('unlockOverlay').classList.add('show');
  unlockShowing = true;
}

  const row=document.getElementById('frow-'+key);
  const fs=document.getElementById('frow-stars-'+key);
  if(fs) fs.innerHTML=renderRatingInteractive(id,key,stars,19);
  toast('Salvato');
}
function saveFood(id,key,val){
  const p=places.find(x=>x.id===id); if(!p) return;
  if(!p.food[key]) p.food[key]={r:0,n:''};
  p.food[key].n=val.trim(); save();
}
function saveNote(id,val){
  const p=places.find(x=>x.id===id); if(!p) return;
  p.note=val.trim(); save();
}
function toggleAtm(id,tag,el){
  const p=places.find(x=>x.id===id); if(!p) return;
  if(!p.atm) p.atm=[];
  const idx=p.atm.indexOf(tag);
  if(idx>-1){p.atm.splice(idx,1);el.classList.remove('on');}
  else{p.atm.push(tag);el.classList.add('on');}
  save();
}
function saveAll(id){ save(); closeSheet(); render(); toast('Salvato'); }
function deletePlace(id){
  if(!confirm('Rimuovere questo posto?')) return;
  places=places.filter(x=>x.id!==id);
  save(); closeSheet(); render(); toast('Rimosso');
}

// ─── SEARCH (Google Places JS SDK) ───
let autocompleteService = null;
let placesService = null;
let sdkReady = false;

function initGooglePlaces(){
  autocompleteService = new google.maps.places.AutocompleteService();
  const dummy = document.createElement('div');
  placesService = new google.maps.places.PlacesService(dummy);
  sdkReady = true;
  initMap();
}

function onSearch(val){
  clearTimeout(stTimer);
  const ac=document.getElementById('ac');
  if(val.length<2){ac.style.display='none';return;}
  if(window._gmAuthFailed){toast('⚠️ Chiave API Google non autorizzata per questo dominio.');return;}
  if(!sdkReady){toast('Caricamento ricerca in corso, riprova tra un secondo.');return;}
  stTimer=setTimeout(()=>{
    autocompleteService.getPlacePredictions({
      input: val,
      types: ['establishment'],
      componentRestrictions: {country:'it'},
      locationBias: {center:{lat:41.07,lng:14.33},radius:50000},
    }, (predictions, status)=>{
      if(status !== google.maps.places.PlacesServiceStatus.OK || !predictions){
        ac.style.display='none';
        if(status==='REQUEST_DENIED') toast('⚠️ Chiave API bloccata — controlla le restrizioni dominio.');
        return;
      }
      const res = predictions.slice(0,6);
      ac._r = res; ac.style.display='block';
      ac.innerHTML = res.map((p,i)=>{
        const main = p.structured_formatting?.main_text||p.description||'';
        const sec  = p.structured_formatting?.secondary_text||'';
        return `<div class="ac-row" onmousedown="addPlaceFromPrediction(${i})" ontouchstart="addPlaceFromPrediction(${i})">
          <div class="ac-ico" style="background:${TYPE_TINT[p.type]||'var(--blue-t)'};color:${TYPE_COLOR[p.type]||'var(--blue)'}">${TYPE_EMOJI[p.type]||'🍽'}</div>
          <div><div class="ac-name">${esc(main)}</div><div class="ac-addr">${esc(sec)}</div></div>
        </div>`;
      }).join('');
    });
  },300);
}

function addPlaceFromPrediction(i){
  const ac=document.getElementById('ac');
  const pred=ac._r&&ac._r[i]; if(!pred) return;
  const main=pred.structured_formatting?.main_text||pred.description||'';
  const sec=pred.structured_formatting?.secondary_text||'';
  if(places.find(x=>x.name===main)){toast('Già in lista!');return;}
  // Fetch details for types
  placesService.getDetails({placeId:pred.place_id, fields:['types','formatted_address','geometry']}, (place, status)=>{
    const types = place?.types||[];
    const type = detectType(types);
    const address = place?.formatted_address||sec;
    const loc = place?.geometry?.location;
    const newPlace = {id:Date.now(),name:main,type,address,ig:'',
      lat:loc?loc.lat():null,lng:loc?loc.lng():null,price:0,
      rating:0,date:new Date().toISOString().split('T')[0],note:'',
      food:{antipasti:{r:0,n:''},primo:{r:0,n:''},dolce:{r:0,n:''},bevande:{r:0,n:''}},
      atm:[],visits:[]};
    places.unshift(newPlace);
    save();
    document.getElementById('sb').value=''; hideAC();
    activeFilter='tutti';
    document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('on',c.dataset.f==='tutti'));
    render();
    openDetail(newPlace.id);
  });
}

function addPlace(i){ addPlaceFromPrediction(i); }
function hideAC(){ document.getElementById('ac').style.display='none'; }

// ─── STASERA ───
function openStasera(){
  const top=places.filter(p=>p.rating>=4).sort((a,b)=>b.rating-a.rating);
  document.getElementById('modalSub').textContent=top.length?top.length+' posto'+(top.length>1?'i':'')+' con 4+ spicchi':'';
  const ml=document.getElementById('modalList');
  ml.innerHTML=!top.length
    ?`<div class="no-top">⭐<br>Valuta i tuoi posti dopo la cena<br>e troverai qui i migliori.</div>`
    :top.map(p=>`<div class="tn-card"><div><div class="tn-name">${esc(p.name)}</div><div class="tn-pizze">${renderRating(p.rating,5,15)}</div><div class="tn-type">${cap(p.type)} · ${(p.atm||[]).slice(0,2).join(', ')}</div></div><button class="tn-go" onclick="closeModal();openDetail(${p.id})">Dettagli</button></div>`).join('');
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){ document.getElementById('modalOverlay').classList.remove('open'); }
function closeModalOutside(e){ if(e.target.id==='modalOverlay') closeModal(); }

// ─── FILTER / SORT / SEARCH ───
function setFilter(el){
  activeFilter=el.dataset.f;
  document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('on',c===el));
  render();
}
function setSort(key,btn){
  sortBy=key;
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.toggle('on',b===btn));
  render();
}
function onListSearch(val){
  searchQuery=val.trim();
  render();
}

// ─── PRICE ───
function setPriceLevel(id,level){
  const p=places.find(x=>x.id===id); if(!p) return;
  p.price = p.price===level ? 0 : level;
  save();
  document.querySelectorAll('.price-opt').forEach((el,i)=>el.classList.toggle('on',i+1===p.price));
  render();
}

// ─── NUOVA VISITA ───
function newVisit(id){
  const p=places.find(x=>x.id===id); if(!p) return;
  if(!p.rating && !Object.values(p.food||{}).some(f=>f.r>0) && !p.note){
    toast('Aggiungi prima una valutazione'); return;
  }
  if(!confirm('Archivia questa visita e inizia una nuova scheda?')) return;
  if(!p.visits) p.visits=[];
  p.visits.push({
    date:p.date||new Date().toISOString().split('T')[0],
    rating:p.rating, food:JSON.parse(JSON.stringify(p.food||{})),
    note:p.note||'', atm:JSON.parse(JSON.stringify(p.atm||[])), price:p.price||0,
  });
  p.rating=0; p.food={antipasti:{r:0,n:''},primo:{r:0,n:''},dolce:{r:0,n:''},bevande:{r:0,n:''}};
  p.note=''; p.price=0;
  p.date=new Date().toISOString().split('T')[0];
  save(); openDetail(id); toast('Visita archiviata!');
}

// ─── MAP ───
let _mapReady = false;
function initMap(){
  _mapReady = true;
  if(document.getElementById('view-mappa').classList.contains('on')) renderMap();
}
function renderMap(){
  if(!_mapReady || !window.google) return;
  const canvas = document.getElementById('map-canvas');
  if(!canvas) return;
  const withCoords = places.filter(p=>p.lat&&p.lng);
  const center = withCoords.length
    ? {lat: withCoords.reduce((s,p)=>s+p.lat,0)/withCoords.length, lng: withCoords.reduce((s,p)=>s+p.lng,0)/withCoords.length}
    : {lat:41.07, lng:14.33};
  if(!mapInstance){
    mapInstance = new google.maps.Map(canvas,{
      center, zoom:12,
      mapTypeControl:false,streetViewControl:false,fullscreenControl:false,
      styles:[{featureType:'poi',stylers:[{visibility:'off'}]},{featureType:'transit',stylers:[{visibility:'off'}]}]
    });
  } else {
    mapInstance.setCenter(center);
  }
  mapMarkers.forEach(m=>m.setMap(null));
  mapMarkers=[];
  withCoords.forEach(p=>{
    const marker = new google.maps.Marker({
      position:{lat:p.lat,lng:p.lng},
      map:mapInstance,
      title:p.name,
      icon:{
        path:'M12 1.6 L14.1 9.9 L22.4 12 L14.1 14.1 L12 22.4 L9.9 14.1 L1.6 12 L9.9 9.9 Z',
        fillColor:'#1B2FE8',fillOpacity:1,strokeWeight:0,scale:1.1,
        anchor:new google.maps.Point(12,12),
      }
    });
    marker.addListener('click',()=>openDetail(p.id));
    mapMarkers.push(marker);
  });
  if(!withCoords.length){
    canvas.innerHTML='<div class="map-empty"><div style="font-size:40px">🗺</div><div class="map-empty-title">Nessun posto con coordinate</div><p style="font-size:13px;color:var(--muted);margin-top:8px">Aggiungi posti tramite la ricerca Google per vederli sulla mappa.</p></div>';
  }
}

function openIG(url){ window.open(url,'_blank'); }

// ─── TOAST ───
let tTimer;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(tTimer); tTimer=setTimeout(()=>el.classList.remove('show'),2400);
}

// ─── UTILS ───
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function cap(s){ return s?s.charAt(0).toUpperCase()+s.slice(1):s; }
function fmtDate(d){ if(!d)return ''; const[y,m,dd]=d.split('-'); return `${dd}/${m}/${y}`; }

// ─── INIT ───
checkBadges();
render();
</script>
